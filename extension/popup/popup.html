<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <h1 class="app-heading" id="appHeading">GHOST</h1>
    </div>

    <!-- Toggle -->
    <div class="toggle-area">
      <button class="toggle-switch" id="toggleSwitch" role="switch" aria-checked="false">
        <span class="toggle-track" id="toggleTrack">
          <span class="toggle-thumb" id="toggleThumb"></span>
        </span>
      </button>
    </div>

    <!-- Status -->
    <div class="status-area">
      <div class="connection-label" id="connectionLabel">Disabled</div>
      <div class="protection-msg" id="protectionMsg">
        Your browser is <strong>not protected</strong>
      </div>
    </div>

    <!-- Pause Feature -->
    <div class="pause-area">
      <div class="site-info" id="currentSite">Loading...</div>
      <button class="pause-btn" id="pauseSiteBtn"></button>
    </div>

    <!-- YouTube PIP Feature -->
    <div class="yt-area" id="ytArea" style="display: none;">
      <h3 class="yt-title">YouTube Mode</h3>
      <button class="yt-pip-btn" id="pipBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M0 3.5A1.5 1.5 0 0 1 1.5 2h13A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 12.5v-9zM1.5 3a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-13z"/><path d="M8 8.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-5a.5.5 0 0 1-.5-.5v-3z"/></svg>
        <span>Open Picture-in-Picture</span>
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="brand">
        <span class="brand-name">GHOST</span>
        <span class="brand-sub">By ACE</span>
      </div>
      <button id="themeToggle" class="theme-btn" title="Toggle Theme"></button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
